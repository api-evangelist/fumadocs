meters:
  - name: hosting_costs
    unit: varies
    aggregation: sum
    dimensions:
      - host
principles:
  - name: Visibility
    description: Costs of running a Fumadocs site come from the underlying host (Vercel, Netlify,
      Cloudflare Pages, etc.); track those provider bills rather than Fumadocs.
  - name: Allocation
    description: Allocate documentation-site hosting cost to the product or team that owns the
      docs.
  - name: Optimization
    description: Use static export and CDN caching; pre-build search indexes; avoid dynamic
      runtime where the static path suffices.
  - name: Accountability
    description: DevRel / docs owner is accountable for documentation hosting cost; no Fumadocs
      invoice exists.
