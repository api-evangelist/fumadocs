naftiko: 1.0.0-alpha2
info:
  label: Fumadocs Search API — Search
  description: 'Fumadocs Search API — Search. 2 operations. Lead operation: Fumadocs Search documentation content. Self-contained
    Naftiko capability covering one Fumadocs business surface.'
  tags:
  - Fumadocs
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FUMADOCS_API_KEY: FUMADOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: search-search
    baseUri: ''
    description: Fumadocs Search API — Search business capability. Self-contained, no shared references.
    resources:
    - name: api-search
      path: /api/search
      operations:
      - name: searchdocs
        method: GET
        description: Fumadocs Search documentation content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-search-static
      path: /api/search/static
      operations:
      - name: exportsearchindex
        method: GET
        description: Fumadocs Export the search index for static/client-side search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: search-search-rest
    port: 8080
    description: REST adapter for Fumadocs Search API — Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/search
      name: api-search
      description: REST surface for api-search.
      operations:
      - method: GET
        name: searchdocs
        description: Fumadocs Search documentation content
        call: search-search.searchdocs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/search/static
      name: api-search-static
      description: REST surface for api-search-static.
      operations:
      - method: GET
        name: exportsearchindex
        description: Fumadocs Export the search index for static/client-side search
        call: search-search.exportsearchindex
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fumadocs Search API — Search. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: fumadocs-search-documentation-content
      description: Fumadocs Search documentation content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-search.searchdocs
      outputParameters:
      - type: object
        mapping: $.
    - name: fumadocs-export-search-index-static
      description: Fumadocs Export the search index for static/client-side search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-search.exportsearchindex
      outputParameters:
      - type: object
        mapping: $.
