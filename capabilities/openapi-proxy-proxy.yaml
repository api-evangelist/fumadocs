    namespace: openapi-proxy-proxy
    baseUri: ''
    description: Fumadocs OpenAPI Proxy API — Proxy business capability. Self-contained, no shared references.
    resources:
    - name: api-proxy
      path: /api/proxy
      operations:
      - name: proxyget
        method: GET
        description: Fumadocs Proxy a GET request to an external API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: proxypost
        method: POST
        description: Fumadocs Proxy a POST request to an external API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: proxyput
        method: PUT
        description: Fumadocs Proxy a PUT request to an external API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: proxypatch
